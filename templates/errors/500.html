{% extends "base.html" %}
{% block title %}Server Error - CampusNotes{% endblock %}
{% block content %}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <div class="text-9xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-red-500 to-orange-500 mb-4">500</div>
        <h1 class="text-3xl font-bold text-gray-900 mb-4">Internal Server Error</h1>
        <p class="text-gray-600 mb-8 text-lg">Oops! Something went wrong on our end. We're working on fixing it. Please try again later.</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="{{ url_for('index') }}" class="px-8 py-3 bg-indigo-600 text-white rounded-xl font-semibold hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">Go Home</a>
            <button onclick="window.location.reload()" class="px-8 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-semibold hover:bg-gray-50 transition">Refresh Page</button>
        </div>
    </div>
</div>
{% endblock %}
