{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-page login">
  <div class="stars-container">
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
  </div>
  <div class="auth-card">
    <div class="auth-logo" style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 24px;">
      <div style="font-size: 2.5rem; margin-bottom: 8px;">🔑</div>
      <div style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;">Campus<strong style="color:var(--primary)">Notes</strong></div>
    </div>
    <div class="auth-title">Reset Password</div>
    <div class="auth-subtitle">Create a new secure password</div>

    <form method="post" action="{{ url_for('reset_password') }}">
      <div class="form-group">
        <label>New Password</label>
        <div class="password-field">
          <input type="password" name="password" id="newPassword" class="form-control" placeholder="••••••••" required autofocus minlength="6">
          <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">👁</button>
        </div>
      </div>
      
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-field">
          <input type="password" name="confirm" id="confirmPassword" class="form-control" placeholder="••••••••" required minlength="6">
          <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">👁</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" style="justify-content: center; margin-top: 8px;">
        Update Password ✓
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function togglePassword(id) {
    const input = document.getElementById(id);
    const btn = input.nextElementSibling;
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }
</script>
{% endblock %}
