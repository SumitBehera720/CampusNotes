{% extends 'base.html' %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="auth-page signup">
  <div class="stars-container">
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
  </div>
  <div class="auth-card" style="max-width: 520px;">
    <div class="auth-logo" style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 24px;">
      <div style="width: 56px; height: 56px; background: #050505; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-weight: 800; font-size: 1.2rem; font-family: 'Syne', sans-serif; margin-bottom: 12px; border: 2px solid #FFFFFF;">CN</div>
      <div style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;">Campus<strong style="color:var(--primary)">Notes</strong></div>
    </div>
    <div class="auth-title">Create your account</div>
    <div class="auth-subtitle">Join students sharing quality academic notes</div>

    <form method="post">
      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" name="name" class="form-control" placeholder="Your full name" required>
      </div>
      <div class="form-group">
        <label>Email address <span class="required">*</span></label>
        <input type="email" name="email" class="form-control" placeholder="you@college.edu" required>
      </div>
        <div class="form-group">
          <label>Password <span class="required">*</span></label>
          <div class="password-field">
            <input type="password" name="password" id="password" class="form-control" placeholder="Min 6 characters" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password')">👁</button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password <span class="required">*</span></label>
          <div class="password-field">
            <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="Repeat password" required>
            <button type="button" class="password-toggle" onclick="togglePassword('confirm_password')">👁</button>
          </div>
        </div>

      <div style="border-top: 1px solid var(--border); padding-top: 16px; margin-bottom: 16px;">
        <div style="font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 600; margin-bottom: 12px;">Optional Details</div>
        <div class="form-group">
          <label>College / University</label>
          <input type="text" name="college" class="form-control" placeholder="Your college name">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Branch</label>
            <select name="branch" class="form-control">
              <option value="">Select Branch</option>
              {% for b in config.BRANCHES %}
              <option value="{{ b }}">{{ b }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group">
            <label>Semester</label>
            <select name="semester" class="form-control">
              <option value="">Select Semester</option>
              {% for s in config.SEMESTERS %}
              <option value="{{ s }}">Semester {{ s }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-lg w-full" style="justify-content: center;">
        Create Account →
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
