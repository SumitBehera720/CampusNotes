{% extends 'base.html' %}
{% block title %}Resend Verification{% endblock %}

{% block content %}
<div class="auth-page login">
  <div class="stars-container">
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
    <div class="star-fall"></div>
  </div>
  <div class="auth-card">
    <div class="auth-logo" style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 24px;">
      <div style="font-size: 2.5rem; margin-bottom: 8px;">📩</div>
      <div style="font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.4rem;">Campus<strong style="color:var(--primary)">Notes</strong></div>
    </div>
    <div class="auth-title">Resend Verification</div>
    <div class="auth-subtitle">Enter your email to receive a new link</div>

    <form method="post">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" name="email" class="form-control" placeholder="you@college.edu" required autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full" style="justify-content: center; margin-top: 8px;">
        Resend Email →
      </button>
    </form>

    <div class="auth-footer">
      Suddenly remembered? <a href="{{ url_for('login') }}">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
